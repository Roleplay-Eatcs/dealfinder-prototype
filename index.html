<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealFinder Purdue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.6rem; letter-spacing: 1px; }
    .header-item-search input {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 280px;
    }
    .purdue-logo img {
      height: 40px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .zip-header { margin-bottom: 24px; }
    .zip-header h2 { font-size: 1.4rem; color: #1a1a2e; }
    .zip-header p { color: #666; font-size: 0.95rem; margin-top: 4px; }
    .active-stores {
      background: #fff;
      border-radius: 10px;
      padding: 16px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .active-stores .label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .active-stores .value { font-size: 1.6rem; font-weight: 700; }
    .section-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 14px; }
    .store-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 30px;
    }
    .store-list-item {
      background: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .store-list-item:hover { border-color: #e94560; }
    .store-list-item.selected { border-color: #e94560; }
    .store-list-item .name { font-weight: 600; font-size: 0.95rem; }
    .store-list-item .type { font-size: 0.8rem; color: #888; }
    .store-list-item .count { font-size: 0.8rem; color: #e94560; margin-top: 2px; }
    .store-list-item .free-tag { color: #2ecc71; font-weight: 600; }

    .item-search {
      margin-bottom: 24px;
      position: relative;
    }
    .item-search input {
      width: 100%;
      padding: 12px 18px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .item-search input:focus { border-color: #e94560; }
    .search-results {
      margin-bottom: 30px;
    }
    .search-results .search-store-group {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .search-store-group .store-group-header {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .search-store-group .store-group-type {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 14px;
    }
    .no-results {
      text-align: center;
      color: #888;
      padding: 40px 20px;
      font-size: 1rem;
    }

    .carousel-wrapper { position: relative; margin-bottom: 30px; }
    .carousel {
      display: flex;
      overflow: hidden;
      border-radius: 10px;
    }
    .store-slide {
      min-width: 100%;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 28px 32px;
      transition: transform 0.4s ease;
    }
    .store-slide .store-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .store-slide .store-type {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 18px;
    }
    .sale-items { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .sale-item {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
    }
    .sale-item:hover { background: #f8f8f8; }
    .sale-item .item-name { font-size: 0.95rem; font-weight: 600; }
    .sale-item .prices { display: flex; align-items: center; gap: 8px; }
    .sale-item .original {
      font-size: 0.85rem;
      color: #999;
      text-decoration: line-through;
    }
    .sale-item .sale-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e94560;
    }
    .sale-item .discount {
      font-size: 0.75rem;
      background: #e94560;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      align-self: flex-start;
    }
    .sale-item .store-label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }
    .carousel-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }
    .carousel-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #1a1a2e;
      background: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }
    .carousel-btn:hover { background: #1a1a2e; color: #fff; }
    .carousel-dots { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      cursor: pointer;
    }
    .dot.active { background: #e94560; }
    .free-banner {
      display: inline-block;
      background: #2ecc71;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 4px 14px;
      border-radius: 4px;
      margin-bottom: 12px;
      text-decoration: none;
    }
    .pantry-note { font-size: 0.9rem; color: #666; margin-bottom: 18px; }
    .hours-grid { max-width: 400px; }
    .hours-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .hours-row .day { font-weight: 600; font-size: 0.95rem; }
    .hours-row .time { font-size: 0.95rem; color: #333; }
    .hours-row.closed .time { color: #999; }
    footer {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>DealFinder Purdue</h1>
    <div class="header-item-search">
      <input type="text" id="item-search-input" placeholder="Search for an item">
    </div>
    <div class="purdue-logo">
      <img src="purduelogo.png" alt="Purdue University">
    </div>
  </header>
  <div class="container">
    <div class="zip-header">
      <h2 id="zip-title">Sales Overview</h2>
      <p id="zip-subtitle"></p>
    </div>
    <div class="active-stores">
      <span class="label">Active Stores with Sales</span>
      <span class="value" id="store-count">0</span>
    </div>

    <div class="search-results" id="search-results" style="display: none;"></div>

    <div id="browse-section">
      <h3 class="section-title">Stores</h3>
      <div class="store-list" id="store-list"></div>
      <h3 class="section-title">Items on Sale</h3>
      <div class="carousel-wrapper">
        <div class="carousel" id="carousel"></div>
        <div class="carousel-nav">
          <button class="carousel-btn" onclick="moveSlide(-1)">&#8592;</button>
          <div class="carousel-dots" id="dots"></div>
          <button class="carousel-btn" onclick="moveSlide(1)">&#8594;</button>
        </div>
      </div>
    </div>
  </div>
  <footer>DealFinder Purdue</footer>
  <script>
    var data = null;
    var current = 0;

    function getItemsForStore(storeId) {
      return data.items.filter(function(item) {
        return item.storeId === storeId;
      });
    }

    function getStoreById(storeId) {
      return data.stores.find(function(s) { return s.id === storeId; });
    }

    function renderSaleItem(item, store) {
      return '<a class="sale-item" href="' + store.url + '" target="_blank" rel="noopener">' +
        '<span class="discount">-' + item.discount + '%</span>' +
        '<span class="item-name">' + item.name + '</span>' +
        '<div class="prices">' +
          '<span class="original">$' + item.originalPrice.toFixed(2) + '</span>' +
          '<span class="sale-price">$' + item.salePrice.toFixed(2) + '</span>' +
        '</div>' +
      '</a>';
    }

    function renderSaleItemWithStore(item, store) {
      return '<a class="sale-item" href="' + store.url + '" target="_blank" rel="noopener">' +
        '<span class="discount">-' + item.discount + '%</span>' +
        '<span class="item-name">' + item.name + '</span>' +
        '<div class="prices">' +
          '<span class="original">$' + item.originalPrice.toFixed(2) + '</span>' +
          '<span class="sale-price">$' + item.salePrice.toFixed(2) + '</span>' +
        '</div>' +
      '</a>';
    }

    function renderStoreSlide(store) {
      if (store.freeResource) {
        var hoursHtml = '';
        store.hours.forEach(function(h) {
          var closedClass = h.time === 'Closed' ? ' closed' : '';
          hoursHtml += '<div class="hours-row' + closedClass + '">' +
            '<span class="day">' + h.day + '</span>' +
            '<span class="time">' + h.time + '</span>' +
          '</div>';
        });
        return '<div class="store-slide">' +
          '<div class="store-name">' + store.name + '</div>' +
          '<div class="store-type">Free Resource - ' + store.location + '</div>' +
          '<a class="free-banner" href="' + store.url + '" target="_blank" rel="noopener">FREE - Visit Website</a>' +
          '<p class="pantry-note">' + store.note + '</p>' +
          '<div class="hours-grid">' + hoursHtml + '</div>' +
        '</div>';
      }

      var items = getItemsForStore(store.id);
      var itemsHtml = items.map(function(item) {
        return renderSaleItem(item, store);
      }).join('');

      return '<div class="store-slide">' +
        '<div class="store-name">' + store.name + '</div>' +
        '<div class="store-type">' + store.type + '</div>' +
        '<div class="sale-items">' + itemsHtml + '</div>' +
      '</div>';
    }

    function renderPage() {
      document.getElementById('zip-title').textContent =
        'Sales Overview - Zip Code ' + data.zipCode;
      document.getElementById('zip-subtitle').textContent =
        data.location + ' | March 2026';
      document.getElementById('store-count').textContent = data.stores.length;

      var storeListEl = document.getElementById('store-list');
      storeListEl.innerHTML = data.stores.map(function(store, i) {
        var items = getItemsForStore(store.id);
        var countText = store.freeResource
          ? '<span class="free-tag">Free - See hours</span>'
          : items.length + ' items on sale';
        var selectedClass = i === 0 ? ' selected' : '';
        return '<div class="store-list-item' + selectedClass + '" onclick="goToSlide(' + i + ')">' +
          '<div class="name">' + store.name + '</div>' +
          '<div class="type">' + store.type + '</div>' +
          '<div class="count">' + countText + '</div>' +
        '</div>';
      }).join('');

      var carouselEl = document.getElementById('carousel');
      carouselEl.innerHTML = data.stores.map(function(store) {
        return renderStoreSlide(store);
      }).join('');

      var dotsEl = document.getElementById('dots');
      dotsEl.innerHTML = data.stores.map(function(_, i) {
        var activeClass = i === 0 ? ' active' : '';
        return '<span class="dot' + activeClass + '" onclick="goToSlide(' + i + ')"></span>';
      }).join('');
    }

    function updateCarousel() {
      var slides = document.querySelectorAll('.store-slide');
      var dots = document.querySelectorAll('.dot');
      var listItems = document.querySelectorAll('.store-list-item');
      for (var i = 0; i < slides.length; i++) {
        slides[i].style.transform = 'translateX(-' + (current * 100) + '%)';
        dots[i].classList.remove('active');
        listItems[i].classList.remove('selected');
      }
      dots[current].classList.add('active');
      listItems[current].classList.add('selected');
    }

    function moveSlide(dir) {
      var total = data.stores.length;
      current = (current + dir + total) % total;
      updateCarousel();
    }

    function goToSlide(index) {
      current = index;
      updateCarousel();
    }

    function searchItems(query) {
      var resultsEl = document.getElementById('search-results');
      var browseEl = document.getElementById('browse-section');

      if (!query) {
        resultsEl.style.display = 'none';
        browseEl.style.display = '';
        return;
      }

      var lowerQuery = query.toLowerCase();
      var matches = data.items.filter(function(item) {
        return item.name.toLowerCase().indexOf(lowerQuery) !== -1;
      });

      resultsEl.style.display = '';
      browseEl.style.display = 'none';

      if (matches.length === 0) {
        resultsEl.innerHTML = '<div class="no-results">No items found matching "' +
          query.replace(/</g, '&lt;') + '"</div>';
        return;
      }

      var grouped = {};
      matches.forEach(function(item) {
        if (!grouped[item.storeId]) grouped[item.storeId] = [];
        grouped[item.storeId].push(item);
      });

      var html = '';
      Object.keys(grouped).forEach(function(storeId) {
        var store = getStoreById(storeId);
        var items = grouped[storeId];
        html += '<div class="search-store-group">' +
          '<div class="store-group-header">' + store.name + '</div>' +
          '<div class="store-group-type">' + store.type + '</div>' +
          '<div class="sale-items">' +
            items.map(function(item) {
              return renderSaleItemWithStore(item, store);
            }).join('') +
          '</div>' +
        '</div>';
      });

      resultsEl.innerHTML = html;
    }

    fetch('data.json')
      .then(function(res) { return res.json(); })
      .then(function(json) {
        data = json;
        renderPage();
      });

    document.getElementById('item-search-input').addEventListener('input', function(e) {
      searchItems(e.target.value.trim());
    });
  </script>
</body>
</html>
